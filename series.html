<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Series - Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">NETFLIX</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Movies</a></li>
        <li><a href="series.html">Series</a></li>
    </ul>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search movies">
    </div>
    <a href="signin.html">Sign In</a>
</header>

<!-- HERO -->
<section class="page-hero">
    <h1>Series</h1>
</section>

<!-- MOVIES -->
<section class="movies">
    <h2>Trending Series</h2>
    <div class="movie-row">
        <div class="movie-card"><img src="https://image.tmdb.org/t/p/w500/9PFonBhy4cQy7Jz20NpMygczOkv.jpg">
            <div class="overlay">
                <h3>Wednesday</h3>
            </div>
        </div>
        <div class="movie-card"><img src="https://image.tmdb.org/t/p/w500/reEMJA1uzscCbkpeRJeTT2bjqUp.jpg">
            <div class="overlay">
                <h3>Money Heist</h3>
            </div>
        </div>
        <div class="movie-card"><img src="https://image.tmdb.org/t/p/w500/stTEycfG9928HYGEISBFaG1ngjM.jpg">
            <div class="overlay">
                <h3>The Boys</h3>
            </div>
        </div>
    </div>
</section>

<!-- MOVIE MODAL -->
<div class="movie-modal" id="movie-modal">
    <div class="modal-content">
        <span class="close-modal">✖</span>
        <h2>Movie Title</h2>
        <p>
            This is a movie description. Plot, genre, rating etc.
        </p>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
